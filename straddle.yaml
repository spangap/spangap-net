# spangap-net — IP networking + TLS + NTP + mDNS.
#
# Split out of spangap-core in Phase 2 of the straddles plan. Firmware-only,
# no browser half, not a UI activator. Pulled in by any straddle that needs
# WiFi/TCP/UDP — RNS-over-TCP, AutoInterface UDP-multicast, HTTPS server,
# OTA, ACME, etc. A LoRa- or ESPNOW-only node skips this entirely.
schema_version: 1
name: spangap/spangap-net
prefix: net
version: 0.1.0
firmware: esp-idf
platforms: [idf]
requires:
  - spangap/spangap-core
optional_requires:
  # net.cpp / spangap_mdns.cpp register on-device Settings panes via
  # spangap-lcd's lcdSetting* helpers, gated on CONFIG_SPANGAP_LCD.
  - spangap/spangap-lcd
# Auto-init: the net foundation the buildable used to bring up by hand in
# app_main is now folded into the generated spangapInitStraddles() dispatcher.
# These sit in the network-bring-up band (<50) so they run before every
# service/app-layer straddle. ntpInit() ends by applying the persisted
# timezone, so logs switch from UTC to local time from this point on.
init:
  - call: tlsInit
    order: 10
  - call: netInit
    order: 20
  - call: ntpInit
    order: 30
  - call: mdnsInit
    order: 40
