# spangap-net — IP networking + TLS + NTP + mDNS.
#
# Split out of spangap-core in Phase 2 of the straddles plan. Pulled in by any
# straddle that needs WiFi/TCP/UDP — RNS-over-TCP, AutoInterface UDP-multicast,
# HTTPS server, OTA, ACME, etc. A LoRa- or ESPNOW-only node skips this entirely.
# Owns its own frontends: the on-device WiFi/mDNS LCD panes (netLcdRegister /
# mdnsLcdRegister, when: spangap-lcd) and the browser WiFi/mDNS panels
# (browser_register: registerNet, when spangap-web stages the SPA shell).
schema_version: 1
name: spangap/spangap-net
prefix: net
version: 0.1.0
firmware: esp-idf
browser: browser
platforms: [idf]
# spangap-core is implicit (the empty-prefix platform foundation) — not listed.
# Remote-access services ride on the IP stack: anything that pulls in net gets
# ACME / UPnP / WireGuard / DuckDNS / sshd staged by default (each hard-requires
# net anyway). They carry their own when:-gated init hooks plus a browser_register
# hook, so a build that drops one with `spangap build --without spangap/<name>`
# compiles AND un-bundles its UI cleanly. (The on-device Net Settings panes still
# register via the when: spangap/spangap-lcd netLcdRegister / mdnsLcdRegister
# hooks below — they ride on whoever staged lcd, no longer on a net-side install.)
additional_installs:
  - spangap/acme
  - spangap/upnp
  - spangap/wg
  - spangap/duckdns
  - spangap/sshd
# Auto-init: the net foundation the buildable used to bring up by hand in
# app_main is now folded into the generated spangapInitStraddles() dispatcher.
# net is in the dispatcher's platform band (right after core, see spangap-inside
# PLATFORM_ORDER), so the IP stack is up before every service/app straddle —
# they need not order themselves against it. These four fire in listed order:
# TLS, then the netif/WiFi, then NTP (which ends by applying the persisted
# timezone, so logs switch UTC→local from here), then mDNS.
init:
  - call: tlsInit
  - call: netInit
  - call: ntpInit
  - call: mdnsInit
  - call: netLcdRegister
    when: spangap/spangap-lcd
  - call: mdnsLcdRegister
    when: spangap/spangap-lcd

# Browser-side UI registration (parallel to init:) — auto-wired into the
# buildable SPA via straddles.gen.ts when spangap-web stages the shell. Replaces
# the hand-maintained registerNetwork() that used to live in spangap-web's own
# boot/modules.ts (the shell no longer reaches into s.net.* keys).
browser_register:
  - call: registerNet
    module: modules/net
